services:
  mousemerchant:
    build: .
    container_name: mousemerchant
    ports:
      - "3001:3000"
    environment:
      MOUSEMERCHANT_PORT: "3000"
      MOUSEMERCHANT_MASTER_KEY: "${MOUSEMERCHANT_MASTER_KEY}"
      MOUSEMERCHANT_ADMIN_PASSWORD: "${MOUSEMERCHANT_ADMIN_PASSWORD}"
      MOUSEMERCHANT_INITIAL_MAM_COOKIE: "${MOUSEMERCHANT_INITIAL_MAM_COOKIE:-}"
      MOUSEMERCHANT_WEB_ENABLED: "true"
      MOUSEMERCHANT_HTTPS_ONLY_COOKIES: "false"
      MOUSEMERCHANT_INITIAL_SCHEDULE_TIME: "${MOUSEMERCHANT_INITIAL_SCHEDULE_TIME:-01:00}"
      TZ: "${TZ:-Europe/Berlin}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(async (r) => { if (!r.ok) process.exit(1); const j = await r.json(); if (!j.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
